<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe in C</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>

        <p class="subtitle">
            Built using C logic and recreated using HTML, CSS & JavaScript.
        </p>

        <!-- Game Board -->
        <div class="board">

            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>

            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>

            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>

        </div>

        <!-- Status -->
        <h2 id="status">
            Player X's Turn
        </h2>

        <!-- Restart -->
        <button id="restart">
            Restart Game
        </button>

       <a
        class="source"
        href="https://raw.githubusercontent.com/Advait-79/Advait-Ambarkar-Tic-Tac-Toe/main/Tic%20Tac%20Toe.c"
        target="_blank">

        View Original C Source Code

    </a>

    </div>

<script src="script.js"></script>

</body>
</html>
